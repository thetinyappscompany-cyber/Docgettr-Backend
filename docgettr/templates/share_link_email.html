<div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h2 style="color: #111; margin-top: 0;">A document has been shared with you</h2>
    <p style="color: #444; line-height: 1.6;">
        {{ shared_by }} has shared <strong>{{ display_filename }}</strong> with you via Docgettr.
    </p>
    <p>
        <a href="{{ share_url }}" style="display: inline-block; background: #111; color: #fff;
            padding: 12px 20px; border-radius: 8px; text-decoration: none;">
            View Document
        </a>
    </p>
    <p style="color: #666; font-size: 13px;">
        This link expires on {{ frappe.utils.format_date(expires_at) }}.
    </p>
    <hr style="border: none; border-top: 1px solid #eee; margin: 24px 0;" />
    <p style="color: #999; font-size: 12px;">
        If you weren't expecting this, you can ignore the email — the link will expire on its own.
    </p>
</div>
